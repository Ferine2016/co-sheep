<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Friend Relationships</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Courier New', monospace;
        background: #1a1a2e;
        color: #eee;
        padding: 20px;
        overflow-y: auto;
      }
      h1 { font-size: 18px; margin-bottom: 16px; color: #e94560; }
      h2 { font-size: 14px; color: #aaa; margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 1px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 8px;
        margin-bottom: 16px;
      }
      .friend-card {
        padding: 10px 8px;
        background: #16213e;
        border: 2px solid #333;
        border-radius: 6px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .friend-card:hover { border-color: #666; }
      .friend-card.selected { border-color: #e94560; }
      .card-name { font-size: 13px; font-weight: bold; margin-bottom: 4px; }
      .card-mood { font-size: 10px; color: #888; }
      .detail { display: none; }
      .detail.open { display: block; }
      .detail-section {
        background: #16213e;
        border: 2px solid #333;
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 10px;
      }
      .stat-row {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        font-size: 12px;
        border-bottom: 1px solid #222;
      }
      .stat-val { color: #e94560; font-weight: bold; }
      .affinity-bar-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 0;
        font-size: 11px;
      }
      .affinity-name { min-width: 80px; }
      .affinity-bar {
        flex: 1;
        height: 8px;
        background: #222;
        border-radius: 4px;
        overflow: hidden;
      }
      .affinity-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.3s;
      }
      .affinity-val { min-width: 30px; text-align: right; font-size: 10px; color: #888; }
      .memory-item {
        padding: 6px 0;
        border-bottom: 1px solid #222;
        font-size: 11px;
      }
      .memory-time { color: #666; font-size: 10px; }
      .memory-text { color: #ccc; }
      .empty { color: #555; font-style: italic; font-size: 12px; padding: 8px 0; }
      .refresh-btn {
        padding: 6px 14px;
        background: #16213e;
        border: 2px solid #333;
        border-radius: 6px;
        color: #aaa;
        cursor: pointer;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        float: right;
        margin-top: -34px;
      }
      .refresh-btn:hover { border-color: #e94560; color: #eee; }
    </style>
  </head>
  <body>
    <h1>Friend Relationships</h1>
    <button class="refresh-btn" id="refresh">Refresh</button>

    <div class="grid" id="grid"></div>
    <div class="detail" id="detail"></div>

    <script>
      const { invoke } = window.__TAURI__.core;
      let data = {};
      let selectedId = null;

      async function load() {
        try {
          data = await invoke('get_all_relationships');
        } catch (e) {
          console.error('Failed to load:', e);
          data = {};
        }
        render();
      }

      function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        const ids = Object.keys(data);
        if (ids.length === 0) {
          grid.innerHTML = '<div class="empty">No friend data yet. Friends build memories over time.</div>';
          return;
        }

        for (const id of ids) {
          const f = data[id];
          const card = document.createElement('div');
          card.className = 'friend-card' + (id === selectedId ? ' selected' : '');
          const moodEmoji = { happy: '\u{1F60A}', grumpy: '\u{1F612}', sleepy: '\u{1F634}', excited: '\u{1F929}' };
          card.innerHTML = `
            <div class="card-name">${escapeHtml(f.name)}</div>
            <div class="card-mood">${moodEmoji[f.mood] || ''} ${f.mood}</div>
          `;
          card.addEventListener('click', () => selectFriend(id));
          grid.appendChild(card);
        }

        if (selectedId && data[selectedId]) {
          renderDetail(selectedId);
        }
      }

      async function selectFriend(id) {
        selectedId = id;
        // Load full brain data for detail view
        try {
          const brain = await invoke('get_friend_memory', { id });
          renderDetailFull(brain);
        } catch (e) {
          console.error('Failed to load friend:', e);
        }
        // Update card selection
        document.querySelectorAll('.friend-card').forEach((c, i) => {
          const cardId = Object.keys(data)[i];
          c.classList.toggle('selected', cardId === id);
        });
      }

      function renderDetail(id) {
        const detail = document.getElementById('detail');
        detail.className = 'detail open';
        const f = data[id];
        detail.innerHTML = `
          <h2>${escapeHtml(f.name)}</h2>
          <div class="detail-section">
            <div class="stat-row"><span>Conversations</span><span class="stat-val">${f.stats.conversations_total}</span></div>
            <div class="stat-row"><span>Times Petted</span><span class="stat-val">${f.stats.times_petted}</span></div>
            <div class="stat-row"><span>Group Activities</span><span class="stat-val">${f.stats.group_activities}</span></div>
          </div>
          <h2>Relationships</h2>
          <div class="detail-section" id="rel-bars"></div>
        `;
        renderRelationships(f.relationships, id);
      }

      function renderDetailFull(brain) {
        const detail = document.getElementById('detail');
        detail.className = 'detail open';
        detail.innerHTML = `
          <h2>${escapeHtml(brain.name)}</h2>
          <div class="detail-section">
            <div class="stat-row"><span>Mood</span><span class="stat-val">${brain.mood}</span></div>
            <div class="stat-row"><span>Conversations (today)</span><span class="stat-val">${brain.stats.conversations_today}</span></div>
            <div class="stat-row"><span>Conversations (total)</span><span class="stat-val">${brain.stats.conversations_total}</span></div>
            <div class="stat-row"><span>Times Petted</span><span class="stat-val">${brain.stats.times_petted}</span></div>
            <div class="stat-row"><span>Group Activities</span><span class="stat-val">${brain.stats.group_activities}</span></div>
            <div class="stat-row"><span>Days Alive</span><span class="stat-val">${brain.stats.days_alive}</span></div>
          </div>
          <h2>Relationships</h2>
          <div class="detail-section" id="rel-bars"></div>
          <h2>Recent Memories</h2>
          <div class="detail-section" id="memories"></div>
        `;
        renderRelationships(brain.relationships, brain.id);
        renderMemories(brain.memories || []);
      }

      function renderRelationships(rels, selfId) {
        const container = document.getElementById('rel-bars');
        if (!container) return;
        const entries = Object.entries(rels).filter(([id]) => id !== selfId);
        if (entries.length === 0) {
          container.innerHTML = '<div class="empty">No relationships yet.</div>';
          return;
        }
        container.innerHTML = '';
        for (const [otherId, val] of entries) {
          const otherName = data[otherId]?.name || otherId;
          const pct = Math.max(0, Math.min(100, (val + 10) / 110 * 100));
          const color = val < 0 ? '#e94560' : val > 30 ? '#FFD700' : val > 10 ? '#4ecca3' : '#555';
          const row = document.createElement('div');
          row.className = 'affinity-bar-wrap';
          row.innerHTML = `
            <span class="affinity-name">${escapeHtml(otherName)}</span>
            <div class="affinity-bar"><div class="affinity-fill" style="width:${pct}%;background:${color}"></div></div>
            <span class="affinity-val">${val}</span>
          `;
          container.appendChild(row);
        }
      }

      function renderMemories(memories) {
        const container = document.getElementById('memories');
        if (!container) return;
        if (memories.length === 0) {
          container.innerHTML = '<div class="empty">No memories yet. They\'ll form over time.</div>';
          return;
        }
        container.innerHTML = '';
        const recent = memories.slice().reverse().slice(0, 15);
        for (const m of recent) {
          const item = document.createElement('div');
          item.className = 'memory-item';
          item.innerHTML = `
            <span class="memory-text">${escapeHtml(m.text)}</span>
            <div class="memory-time">${escapeHtml(m.timestamp)}</div>
          `;
          container.appendChild(item);
        }
      }

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
      }

      document.getElementById('refresh').addEventListener('click', load);
      load();
    </script>
  </body>
</html>
