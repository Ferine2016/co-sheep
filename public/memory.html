<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sheep's Brain</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Courier New', monospace;
        background: #1a1a2e;
        color: #eee;
        padding: 24px;
        overflow-y: auto;
      }
      h1 { font-size: 18px; margin-bottom: 4px; color: #e94560; }
      .subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }
      .tabs {
        display: flex;
        gap: 0;
        margin-bottom: 16px;
        border-bottom: 2px solid #333;
      }
      .tab {
        padding: 8px 16px;
        background: none;
        border: none;
        color: #666;
        cursor: pointer;
        font-family: 'Courier New', monospace;
        font-size: 13px;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
      }
      .tab:hover { color: #aaa; }
      .tab.active { color: #e94560; border-bottom-color: #e94560; }
      .tab-content { display: none; }
      .tab-content.active { display: block; }
      .refresh-bar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 12px;
      }
      .refresh-btn {
        padding: 6px 14px;
        background: #16213e;
        border: 1px solid #333;
        border-radius: 4px;
        color: #aaa;
        cursor: pointer;
        font-family: 'Courier New', monospace;
        font-size: 12px;
      }
      .refresh-btn:hover { border-color: #e94560; color: #eee; }

      /* Stats bar */
      .stats-bar {
        display: flex;
        gap: 16px;
        margin-bottom: 16px;
        padding: 10px 14px;
        background: #16213e;
        border-radius: 6px;
        border: 1px solid #333;
        font-size: 12px;
      }
      .stat { color: #aaa; }
      .stat strong { color: #e94560; }

      /* Opinion cards */
      .opinion-card {
        background: #16213e;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 12px 14px;
        margin-bottom: 8px;
      }
      .opinion-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }
      .opinion-topic {
        color: #e94560;
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .opinion-badge {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        background: #333;
        color: #aaa;
      }
      .opinion-badge.hot { background: #e94560; color: white; }
      .opinion-text { font-size: 13px; color: #ccc; margin-bottom: 4px; }
      .opinion-meta { font-size: 11px; color: #555; }
      .category-tag {
        display: inline-block;
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 3px;
        margin-right: 6px;
      }
      .category-tag.habit { background: #2d4a3e; color: #4ecca3; }
      .category-tag.fact { background: #2d3a4a; color: #6eb5ff; }
      .category-tag.opinion { background: #4a2d3a; color: #e9456080; }
      .category-tag.pattern { background: #4a3a2d; color: #f0c040; }

      /* Today counts */
      .count-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 14px;
        background: #16213e;
        border: 1px solid #333;
        border-radius: 6px;
        margin-bottom: 4px;
        font-size: 13px;
      }
      .count-key { color: #ccc; }
      .count-value { color: #e94560; font-weight: bold; }

      /* Journal */
      .journal-content {
        background: #16213e;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 16px;
        white-space: pre-wrap;
        font-size: 12px;
        line-height: 1.6;
        max-height: 400px;
        overflow-y: auto;
        color: #ccc;
      }
      .journal-content::-webkit-scrollbar { width: 6px; }
      .journal-content::-webkit-scrollbar-track { background: #16213e; }
      .journal-content::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
      .empty { color: #555; font-style: italic; padding: 20px; text-align: center; }
    </style>
  </head>
  <body>
    <h1>Sheep's Brain</h1>
    <p class="subtitle">What your sheep knows, believes, and obsesses over</p>

    <div class="stats-bar" id="stats-bar">
      <span class="stat">Comments: <strong id="stat-comments">0</strong></span>
      <span class="stat">Interactions: <strong id="stat-interactions">0</strong></span>
      <span class="stat">Opinions: <strong id="stat-opinions">0</strong></span>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="opinions">Opinions</button>
      <button class="tab" data-tab="counts">Today's Tallies</button>
      <button class="tab" data-tab="journal">Diary</button>
    </div>

    <div class="refresh-bar">
      <button class="refresh-btn" id="refresh-btn">Refresh</button>
    </div>

    <div class="tab-content active" id="tab-opinions">
      <div id="opinions-list"><div class="empty">No opinions yet. The sheep will start forming beliefs as it watches you.</div></div>
    </div>

    <div class="tab-content" id="tab-counts">
      <div id="counts-list"><div class="empty">No tallies yet today.</div></div>
    </div>

    <div class="tab-content" id="tab-journal">
      <div class="journal-content" id="journal-content">
        <div class="empty">No diary entries today.</div>
      </div>
    </div>

    <script>
      const { invoke } = window.__TAURI__.core;

      const tabs = document.querySelectorAll('.tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        });
      });

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function renderOpinions(opinions) {
        if (!opinions || opinions.length === 0) {
          return '<div class="empty">No opinions yet. The sheep will start forming beliefs as it watches you.</div>';
        }

        // Sort by times_seen descending
        opinions.sort((a, b) => b.times_seen - a.times_seen);

        return opinions.map(op => {
          const isHot = op.times_seen >= 5;
          const badge = isHot
            ? `<span class="opinion-badge hot">seen ${op.times_seen}x</span>`
            : `<span class="opinion-badge">seen ${op.times_seen}x</span>`;

          const cat = op.category || 'opinion';
          const catTag = `<span class="category-tag ${cat}">${cat}</span>`;

          return `<div class="opinion-card">
            <div class="opinion-header">
              <span class="opinion-topic">${escapeHtml(op.topic)}</span>
              ${badge}
            </div>
            <div class="opinion-text">${escapeHtml(op.opinion)}</div>
            <div class="opinion-meta">${catTag} First: ${escapeHtml(op.first_seen)} · Last: ${escapeHtml(op.last_seen)}</div>
          </div>`;
        }).join('');
      }

      function renderCounts(counts) {
        const keys = Object.keys(counts || {});
        if (keys.length === 0) {
          return '<div class="empty">No tallies yet today.</div>';
        }
        keys.sort((a, b) => counts[b] - counts[a]);
        return keys.map(k =>
          `<div class="count-row">
            <span class="count-key">${escapeHtml(k)}</span>
            <span class="count-value">${counts[k]}x</span>
          </div>`
        ).join('');
      }

      function renderJournal(text) {
        if (!text || !text.trim()) {
          return '<div class="empty">No diary entries today.</div>';
        }
        return text.split('\n').map(line => {
          line = escapeHtml(line);
          if (line.startsWith('# ') || line.startsWith('## ')) {
            return '<span style="color:#4ecca3;font-weight:bold">' + line + '</span>';
          }
          if (line.includes('**Comment**:')) {
            line = line.replace(/\*\*Comment\*\*:/g, '<strong style="color:#e94560">Comment:</strong>');
          }
          return line;
        }).join('\n');
      }

      async function loadMemory() {
        try {
          const data = await invoke('get_memory');
          document.getElementById('stat-comments').textContent = data.total_comments || 0;
          document.getElementById('stat-interactions').textContent = data.total_interactions || 0;
          document.getElementById('stat-opinions').textContent = (data.opinions || []).length;
          document.getElementById('opinions-list').innerHTML = renderOpinions(data.opinions);
          document.getElementById('counts-list').innerHTML = renderCounts(data.today_counts);
          document.getElementById('journal-content').innerHTML = renderJournal(data.today_journal);
        } catch (e) {
          console.error('Failed to load memory:', e);
        }
      }

      document.getElementById('refresh-btn').addEventListener('click', loadMemory);
      loadMemory();
    </script>
  </body>
</html>
