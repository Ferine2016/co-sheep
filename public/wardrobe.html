<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wardrobe</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Courier New', monospace;
        background: #1a1a2e;
        color: #eee;
        padding: 20px;
        overflow-y: auto;
      }
      h1 {
        font-size: 18px;
        margin-bottom: 16px;
        color: #e94560;
      }
      .preview {
        text-align: center;
        margin-bottom: 20px;
      }
      canvas {
        border: 2px solid #333;
        border-radius: 8px;
        background: #16213e;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
        margin-bottom: 20px;
      }
      .acc-btn {
        padding: 10px 6px;
        background: #16213e;
        border: 2px solid #333;
        border-radius: 6px;
        color: #aaa;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        cursor: pointer;
        text-align: center;
        transition: border-color 0.15s, color 0.15s;
      }
      .acc-btn:hover {
        border-color: #666;
        color: #eee;
      }
      .acc-btn.selected {
        border-color: #e94560;
        color: #e94560;
        background: rgba(233, 69, 96, 0.08);
      }
      .cat {
        font-size: 9px;
        color: #666;
        text-transform: uppercase;
        margin-top: 2px;
      }
      .actions {
        display: flex;
        gap: 10px;
      }
      button.save-btn {
        flex: 1;
        padding: 10px 24px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-family: 'Courier New', monospace;
        font-size: 14px;
        font-weight: bold;
        background: #e94560;
        color: white;
      }
      button.save-btn:hover { background: #ff6b6b; }
      .saved-msg {
        color: #4ecca3;
        font-size: 13px;
        margin-top: 12px;
        text-align: center;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .saved-msg.visible { opacity: 1; }
    </style>
  </head>
  <body>
    <h1>Wardrobe</h1>

    <div class="preview">
      <canvas id="preview" width="200" height="120"></canvas>
    </div>

    <div class="grid" id="grid"></div>

    <div class="actions">
      <button class="save-btn" id="save-btn">Save</button>
    </div>
    <div class="saved-msg" id="saved-msg">Accessories saved!</div>

    <script>
      const { invoke } = window.__TAURI__.core;

      const ACCESSORIES = [
        { id: "party_hat", name: "Party Hat", category: "head" },
        { id: "crown", name: "Crown", category: "head" },
        { id: "top_hat", name: "Top Hat", category: "head" },
        { id: "wizard_hat", name: "Wizard Hat", category: "head" },
        { id: "chef_hat", name: "Chef Hat", category: "head" },
        { id: "halo", name: "Halo", category: "head" },
        { id: "bandana", name: "Bandana", category: "head" },
        { id: "headphones", name: "Headphones", category: "head" },
        { id: "antenna", name: "Antenna", category: "head" },
        { id: "flower", name: "Flower", category: "head" },
        { id: "sunglasses", name: "Sunglasses", category: "face" },
        { id: "pirate_patch", name: "Eye Patch", category: "face" },
        { id: "monocle", name: "Monocle", category: "face" },
        { id: "mustache", name: "Mustache", category: "face" },
        { id: "bow_tie", name: "Bow Tie", category: "neck" },
        { id: "scarf", name: "Scarf", category: "neck" },
        { id: "cape", name: "Cape", category: "neck" },
        { id: "necklace", name: "Necklace", category: "neck" },
      ];

      let selected = new Set();

      // Build grid
      const grid = document.getElementById('grid');
      for (const acc of ACCESSORIES) {
        const btn = document.createElement('div');
        btn.className = 'acc-btn';
        btn.dataset.id = acc.id;
        btn.innerHTML = `${acc.name}<div class="cat">${acc.category}</div>`;
        btn.addEventListener('click', () => {
          if (selected.has(acc.id)) {
            selected.delete(acc.id);
            btn.classList.remove('selected');
          } else {
            selected.add(acc.id);
            btn.classList.add('selected');
          }
          drawPreview();
        });
        grid.appendChild(btn);
      }

      // Preview drawing
      const canvas = document.getElementById('preview');
      const ctx = canvas.getContext('2d');

      function drawPreview() {
        ctx.clearRect(0, 0, 200, 120);
        ctx.imageSmoothingEnabled = false;

        const x = 55, y = 15, size = 96;
        const s = size / 32;
        const facingRight = true;
        const headX = x + size * 0.65;
        const headY_base = y + size * 0.3;

        // Simplified sheep body
        ctx.fillStyle = '#f5f5f5';
        ctx.beginPath();
        ctx.ellipse(x + size * 0.5, y + size * 0.55, size * 0.35, size * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ccc';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Head
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.ellipse(x + size * 0.72, y + size * 0.38, size * 0.14, size * 0.16, 0, 0, Math.PI * 2);
        ctx.fill();

        // Eye
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + size * 0.76, y + size * 0.35, size * 0.04, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(x + size * 0.77, y + size * 0.35, size * 0.02, 0, Math.PI * 2);
        ctx.fill();

        // Legs
        ctx.fillStyle = '#333';
        ctx.fillRect(x + size * 0.3, y + size * 0.78, size * 0.08, size * 0.2);
        ctx.fillRect(x + size * 0.45, y + size * 0.78, size * 0.08, size * 0.2);
        ctx.fillRect(x + size * 0.55, y + size * 0.78, size * 0.08, size * 0.2);
        ctx.fillRect(x + size * 0.65, y + size * 0.78, size * 0.08, size * 0.2);

        // Draw selected accessories
        for (const id of selected) {
          drawAccessory(ctx, id, x, y, size, s, facingRight, headX, headY_base);
        }
      }

      function drawAccessory(ctx, id, x, y, size, s, facingRight, headX, headY_base) {
        switch (id) {
          case 'party_hat': {
            const hy = y + size * 0.15;
            ctx.save();
            ctx.fillStyle = '#e94560';
            ctx.beginPath();
            ctx.moveTo(headX - 4*s, hy + 2*s);
            ctx.lineTo(headX + 4*s, hy + 2*s);
            ctx.lineTo(headX, hy - 8*s);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(headX, hy - 8*s, 2*s, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            break;
          }
          case 'crown': {
            const hy = y + size * 0.2;
            ctx.save();
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.moveTo(headX - 5*s, hy + 1*s);
            ctx.lineTo(headX - 5*s, hy - 3*s);
            ctx.lineTo(headX - 2.5*s, hy - 1*s);
            ctx.lineTo(headX, hy - 4*s);
            ctx.lineTo(headX + 2.5*s, hy - 1*s);
            ctx.lineTo(headX + 5*s, hy - 3*s);
            ctx.lineTo(headX + 5*s, hy + 1*s);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#e94560';
            ctx.beginPath();
            ctx.arc(headX, hy - 2.5*s, 1*s, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            break;
          }
          case 'top_hat': {
            const hy = y + size * 0.18;
            ctx.save();
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(headX - 6*s, hy + 1*s, 12*s, 2*s);
            ctx.fillStyle = '#2a2a3e';
            ctx.fillRect(headX - 4*s, hy - 8*s, 8*s, 9*s);
            ctx.fillStyle = '#e94560';
            ctx.fillRect(headX - 4*s, hy - 1*s, 8*s, 1.5*s);
            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            ctx.fillRect(headX - 3*s, hy - 7*s, 3*s, 6*s);
            ctx.restore();
            break;
          }
          case 'wizard_hat': {
            const hy = y + size * 0.18;
            ctx.save();
            ctx.fillStyle = '#2c3e80';
            ctx.beginPath();
            ctx.ellipse(headX, hy + 2*s, 8*s, 2*s, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#3a4fa0';
            ctx.beginPath();
            ctx.moveTo(headX - 6*s, hy + 2*s);
            ctx.lineTo(headX + 6*s, hy + 2*s);
            ctx.lineTo(headX + 2*s, hy - 12*s);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#FFD700';
            ctx.font = `${3*s}px serif`;
            ctx.fillText('\u2605', headX - 2*s, hy - 3*s);
            ctx.font = `${2*s}px serif`;
            ctx.fillText('\u2605', headX + 2*s, hy - 7*s);
            ctx.restore();
            break;
          }
          case 'chef_hat': {
            const hy = y + size * 0.18;
            ctx.save();
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(headX - 5*s, hy, 10*s, 3*s);
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(headX - 3*s, hy - 2*s, 3.5*s, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(headX + 3*s, hy - 2*s, 3.5*s, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(headX, hy - 4*s, 4*s, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(headX, hy - 1*s, 3*s, 0, Math.PI*2); ctx.fill();
            ctx.restore();
            break;
          }
          case 'halo': {
            const hy = y + size * 0.12;
            ctx.save();
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 2;
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.ellipse(headX, hy, 5*s, 1.5*s, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.restore();
            break;
          }
          case 'bandana': {
            const hy = y + size * 0.25;
            ctx.save();
            ctx.fillStyle = '#e94560';
            ctx.fillRect(headX - 6*s, hy, 12*s, 2.5*s);
            ctx.fillStyle = '#c0392b';
            const knotX = headX - 6*s;
            ctx.beginPath();
            ctx.moveTo(knotX, hy);
            ctx.lineTo(knotX - 4*s, hy - 2*s);
            ctx.lineTo(knotX - 1*s, hy + 1*s);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(knotX, hy + 2.5*s);
            ctx.lineTo(knotX - 5*s, hy + 3*s);
            ctx.lineTo(knotX - 1*s, hy + 1.5*s);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
            break;
          }
          case 'headphones': {
            const hy = headY_base;
            ctx.save();
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(headX, hy - 1*s, 7*s, Math.PI*1.1, Math.PI*1.9);
            ctx.stroke();
            ctx.fillStyle = '#e94560';
            ctx.beginPath(); ctx.ellipse(headX - 7*s, hy + 1*s, 2.5*s, 3*s, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#c0392b';
            ctx.beginPath(); ctx.ellipse(headX - 7*s, hy + 1*s, 1.5*s, 2*s, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#e94560';
            ctx.beginPath(); ctx.ellipse(headX + 7*s, hy + 1*s, 2.5*s, 3*s, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#c0392b';
            ctx.beginPath(); ctx.ellipse(headX + 7*s, hy + 1*s, 1.5*s, 2*s, 0, 0, Math.PI*2); ctx.fill();
            ctx.restore();
            break;
          }
          case 'antenna': {
            const hy = y + size * 0.18;
            ctx.save();
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(headX, hy + 2*s);
            ctx.quadraticCurveTo(headX + 1*s, hy - 5*s, headX - 1*s, hy - 10*s);
            ctx.stroke();
            ctx.fillStyle = '#4ecca3';
            ctx.beginPath();
            ctx.arc(headX - 1*s, hy - 10*s, 2.5*s, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.arc(headX - 1.5*s, hy - 11*s, 1*s, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
            break;
          }
          case 'flower': {
            const fx = x + size * 0.55;
            const fy = y + size * 0.2;
            ctx.save();
            ctx.fillStyle = '#ff69b4';
            for (let i = 0; i < 5; i++) {
              const angle = (i/5) * Math.PI * 2;
              ctx.beginPath();
              ctx.arc(fx + Math.cos(angle)*3*s, fy + Math.sin(angle)*3*s, 2*s, 0, Math.PI*2);
              ctx.fill();
            }
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(fx, fy, 1.5*s, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
            break;
          }
          case 'sunglasses': {
            const glassY = headY_base + 2*s;
            const lensW = 4*s, lensH = 2.5*s;
            ctx.save();
            ctx.fillStyle = 'rgba(20,20,40,0.85)';
            ctx.fillRect(headX - lensW - 1*s, glassY - lensH/2, lensW, lensH);
            ctx.fillRect(headX + 1*s, glassY - lensH/2, lensW, lensH);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(headX - 1*s, glassY);
            ctx.lineTo(headX + 1*s, glassY);
            ctx.stroke();
            ctx.strokeRect(headX - lensW - 1*s, glassY - lensH/2, lensW, lensH);
            ctx.strokeRect(headX + 1*s, glassY - lensH/2, lensW, lensH);
            ctx.restore();
            break;
          }
          case 'pirate_patch': {
            const eyeX = headX + 2*s;
            const eyeY = headY_base + 1*s;
            ctx.save();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(headX - 7*s, headY_base - 2*s);
            ctx.lineTo(headX + 7*s, headY_base - 2*s);
            ctx.stroke();
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            ctx.ellipse(eyeX, eyeY, 3*s, 2.5*s, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
            break;
          }
          case 'monocle': {
            const eyeX = headX + 2*s;
            const eyeY = headY_base + 1.5*s;
            ctx.save();
            ctx.strokeStyle = '#DAA520';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(eyeX, eyeY, 3.5*s, 0, Math.PI*2);
            ctx.stroke();
            ctx.fillStyle = 'rgba(180,220,255,0.15)';
            ctx.beginPath();
            ctx.arc(eyeX, eyeY, 3*s, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = '#DAA520';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(eyeX, eyeY + 3.5*s);
            ctx.quadraticCurveTo(eyeX + 2*s, eyeY + 8*s, eyeX - 1*s, eyeY + 12*s);
            ctx.stroke();
            ctx.restore();
            break;
          }
          case 'mustache': {
            const mY = headY_base + 5*s;
            ctx.save();
            ctx.fillStyle = '#3a2518';
            ctx.beginPath();
            ctx.moveTo(headX, mY);
            ctx.quadraticCurveTo(headX - 3*s, mY - 1.5*s, headX - 5*s, mY + 1*s);
            ctx.quadraticCurveTo(headX - 3*s, mY + 2*s, headX, mY + 0.5*s);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(headX, mY);
            ctx.quadraticCurveTo(headX + 3*s, mY - 1.5*s, headX + 5*s, mY + 1*s);
            ctx.quadraticCurveTo(headX + 3*s, mY + 2*s, headX, mY + 0.5*s);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
            break;
          }
          case 'bow_tie': {
            const tieX = x + size * 0.48;
            const tieY = y + size * 0.55;
            ctx.save();
            ctx.fillStyle = '#9b59b6';
            ctx.beginPath();
            ctx.moveTo(tieX, tieY + 1.5*s);
            ctx.lineTo(tieX - 4*s, tieY);
            ctx.lineTo(tieX - 4*s, tieY + 3*s);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(tieX, tieY + 1.5*s);
            ctx.lineTo(tieX + 4*s, tieY);
            ctx.lineTo(tieX + 4*s, tieY + 3*s);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#7d3c98';
            ctx.fillRect(tieX - 1*s, tieY + 0.5*s, 2*s, 2*s);
            ctx.restore();
            break;
          }
          case 'scarf': {
            const neckX = x + size * 0.5;
            const neckY = y + size * 0.52;
            ctx.save();
            ctx.fillStyle = '#e94560';
            ctx.fillRect(neckX - 10*s, neckY, 20*s, 3*s);
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(neckX - 10*s, neckY + 1*s, 20*s, 1*s);
            const endX = neckX + 8*s;
            ctx.fillStyle = '#e94560';
            ctx.fillRect(endX, neckY + 3*s, 3*s, 6*s);
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(endX, neckY + 4*s, 3*s, 1*s);
            ctx.fillRect(endX, neckY + 7*s, 3*s, 1*s);
            ctx.restore();
            break;
          }
          case 'cape': {
            const neckX = x + size * 0.5;
            const neckY = y + size * 0.48;
            ctx.save();
            ctx.fillStyle = '#8e1538';
            ctx.beginPath();
            ctx.moveTo(neckX - 2*s, neckY);
            ctx.lineTo(neckX - 12*s, neckY + 2*s);
            ctx.quadraticCurveTo(neckX - 14*s, neckY + 12*s, neckX - 10*s, neckY + 16*s);
            ctx.lineTo(neckX - 3*s, neckY + 14*s);
            ctx.quadraticCurveTo(neckX - 1*s, neckY + 8*s, neckX - 2*s, neckY);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#c0392b';
            ctx.beginPath();
            ctx.moveTo(neckX - 3*s, neckY + 2*s);
            ctx.lineTo(neckX - 10*s, neckY + 3*s);
            ctx.quadraticCurveTo(neckX - 12*s, neckY + 10*s, neckX - 9*s, neckY + 14*s);
            ctx.lineTo(neckX - 4*s, neckY + 12*s);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(neckX - 2*s, neckY + 1*s, 1.5*s, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
            break;
          }
          case 'necklace': {
            const cx = x + size * 0.5;
            const ny = y + size * 0.55;
            ctx.save();
            ctx.strokeStyle = '#DAA520';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(cx, ny - 2*s, 8*s, 0.15*Math.PI, 0.85*Math.PI);
            ctx.stroke();
            const pendantY = ny - 2*s + 8*s * Math.sin(0.5*Math.PI);
            ctx.fillStyle = '#4a90d9';
            ctx.beginPath();
            ctx.moveTo(cx, pendantY);
            ctx.lineTo(cx - 2*s, pendantY + 3*s);
            ctx.lineTo(cx + 2*s, pendantY + 3*s);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillRect(cx - 0.5*s, pendantY + 1*s, 1*s, 1*s);
            ctx.restore();
            break;
          }
        }
      }

      // Save button
      document.getElementById('save-btn').addEventListener('click', async () => {
        const ids = Array.from(selected);
        await invoke('save_accessories', { accessories: ids });
        const msg = document.getElementById('saved-msg');
        msg.classList.add('visible');
        setTimeout(() => msg.classList.remove('visible'), 2000);
      });

      // Load current accessories
      (async () => {
        try {
          const ids = await invoke('get_accessories');
          for (const id of ids) {
            selected.add(id);
            const btn = document.querySelector(`[data-id="${id}"]`);
            if (btn) btn.classList.add('selected');
          }
        } catch (e) {
          console.error('Failed to load accessories:', e);
        }
        drawPreview();
      })();
    </script>
  </body>
</html>
